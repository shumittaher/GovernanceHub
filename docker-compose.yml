services:
  postgres:
    image: postgres:16
    container_name: governancehub_postgres
    restart: always
    environment:
      POSTGRES_USER: governancehub
      POSTGRES_PASSWORD: governancehub_password
      POSTGRES_DB: governancehub_db
    ports:
      - "5432:5432"
    volumes:
      - governancehub_pgdata:/var/lib/postgresql/data

volumes:
  governancehub_pgdata: